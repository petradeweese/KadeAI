<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kade Operator Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Kade Operator Console</h1>
      <p>Deterministic operator workstation</p>
    </div>
    <div class="header-controls">
      <span id="runtime-pill" class="pill">runtime</span>
      <span id="provider-pill" class="pill muted">provider</span>
      <span id="market-pill" class="pill muted">market data</span>
      <button id="refresh-btn">Refresh</button>
    </div>
  </header>

  <main class="layout">
    <section class="chat-column card">
      <h2>AI Assistant</h2>
      <div id="transcript" class="transcript"></div>
      <div class="chat-status"><div id="interpreted" class="interpreted"></div><div id="chat-meta" class="chat-meta"></div></div>
      <form id="chat-form" class="chat-input-row">
        <input id="chat-input" placeholder="Ask naturally or type explicit command..." />
        <button type="submit">Send</button>
      </form>
    </section>

    <section class="workspace">
      <div class="status-strip card" id="context-strip">
        <div><strong>Mode</strong>: <span id="workspace-mode">overview</span></div>
        <div><strong>Intent</strong>: <span id="last-intent">-</span></div>
        <div><strong>Symbol</strong>: <span id="active-symbol">-</span></div>
        <div><strong>Direction</strong>: <span id="active-direction">-</span></div>
        <div><strong>Horizon</strong>: <span id="active-horizon">-</span></div>
      </div>

      <div class="section-title" id="workspace-title">Overview Workspace</div>
      <div class="grid two" id="panel-grid">
        <article class="card panel" data-panel="market_context" id="market-context-card"></article>
        <article class="card panel" data-panel="visual_explainability" id="visual-card"></article>
        <article class="card panel" data-panel="trade_idea" id="trade-idea-card"></article>
        <article class="card panel" data-panel="target_move" id="target-move-card"></article>
        <article class="card panel" data-panel="trade_plan" id="trade-plan-card"></article>
      </div>

      <details class="card secondary-stack" open>
        <summary>Secondary Panels</summary>
        <div class="grid two secondary-grid">
          <article class="card panel secondary" data-panel="market_intelligence" id="market-card"></article>
          <article class="card panel secondary" data-panel="premarket_gameplan" id="premarket-card"></article>
          <article class="card panel secondary" data-panel="radar" id="radar-card"></article>
          <article class="card panel secondary" data-panel="movers" id="movers-card"></article>
          <article class="card panel secondary" data-panel="trade_plan_tracking" id="tracking-card"></article>
          <article class="card panel secondary" data-panel="execution_monitor" id="execution-card"></article>
          <article class="card panel secondary" data-panel="strategy_intelligence" id="strategy-card"></article>
          <article class="card panel secondary" data-panel="trade_review" id="review-card"></article>
          <article class="card panel secondary" data-panel="timeline" id="timeline-card"></article>
          <article class="card panel secondary" data-panel="provider_diagnostics" id="diagnostics-card"></article>
        </div>
      </details>

      <details class="card secondary panel" data-panel="raw_debug" id="raw-debug-card">
        <summary>Raw Debug Payloads</summary>
        <pre id="secondary-debug"></pre>
      </details>
    </section>
  </main>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
