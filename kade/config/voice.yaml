voice:
  runtime_mode: text_first
  voice_runtime_enabled: false
  text_command_input_enabled: true
  listening_mode: always_on
  wake_word: Kade
  wakeword_enabled: false
  stt_enabled: false
  tts_enabled: false
  wakeword_provider: mock
  stt_provider: mock
  tts_provider: kokoro
  provider_fallback: mock
  cooldown_ms: 1000
  command_window_ms: 8000
  self_trigger_prevention: true
  response_mode_default: advisor
  text_panel:
    enabled: true
    max_command_history: 25
    placeholder: "Type a command for Kade"
    include_debug_default: true
  provider_health:
    enabled: true
    history_limit: 20
    policy: warn_on_degraded
  replay_debug:
    enabled: true
    retention_limit: 40
  wakeword_backends:
    porcupine:
      keyword: Kade
      sensitivity: 0.5
      enabled: false
      access_key: ""
  stt_backends:
    whisper:
      model: tiny.en
      language: en
      temperature: 0.0
      enabled: false
      runtime_mode: deterministic_text
      supports_realtime_audio: false
  kokoro:
    model: kokoro-v1
    voice: Puck
    mock_synthesis: true
    output_mode: artifact_uri
    artifact_dir: .kade_storage/tts
    artifact_uri_prefix: file://
  mock_behavior:
    enabled: true
    simulate_wakeword: true
    simulate_stt: true
  backend_targets:
    wakeword: porcupine
    stt: whisper
    tts: kokoro
  enable_spoken_news_alerts: false
  spoken_news_priority: high_only
