execution:
  mode: paper
  paper_mode_only: true
  order_type: limit
  limit_orders_only: true
  live_trading_enabled: false
  option_selection:
    default_profile: balanced
    profiles:
      balanced:
        min_days_to_expiration: 3
        max_days_to_expiration: 21
        target_days_to_expiration: 7
        min_open_interest: 400
        min_volume: 150
        max_spread_pct: 0.15
        target_delta_call:
          min: 0.35
          max: 0.6
        target_delta_put:
          min: -0.6
          max: -0.35
        affordability_weight: 1.0
        liquidity_weight: 1.3
        spread_weight: 1.1
        expiration_weight: 0.9
        delta_weight: 1.0
    split_sizing:
      enabled: true
      max_legs: 2
      max_contracts_per_leg: 3
      neighboring_strike_distance: 1
      min_contracts_per_leg: 1
  paper_simulation:
    max_slippage_per_contract: 0.1
    slippage_bps: 8
    allow_partial_fills: true
    partial_fill_ratio: 0.6
    adaptive_nudging_enabled: true
    nudge_step: 0.02
  guardrails:
    max_trades_per_day: 5
    daily_loss_limit_usd: 3000
    max_slippage_cap_per_contract: 0.12
  option_scenarios:
    default_profile: fast_intraday
    default_allowed_dtes:
    - 0
    - 1
    - 2
    bucket_top_n: 3
    profiles:
      scalp_0dte:
        min_open_interest: 300
        min_volume: 120
        max_spread_pct: 0.14
        entry_aggressiveness: 0.55
        entry_spread_penalty_multiplier: 0.2
        slippage_haircut_pct: 0.05
        spread_haircut_multiplier: 0.35
        fallback_delta: 0.35
        target_price_floor_multiplier: 0.65
        short_window_minutes: 20
        short_window_uplift: 0.12
        gamma_uplift_by_dte:
          0: 0.22
          1: 0.14
          2: 0.08
        target_delta_range:
        - 0.35
        - 0.7
        dte_preferences:
          0: 1.0
          1: 0.86
          2: 0.72
        ranking_weights:
          estimated_percent_return: 1.4
          estimated_total_gain: 1.2
          liquidity: 1.2
          spread_quality: 1.2
          delta_suitability: 1.0
          dte_fit: 1.1
      fast_intraday:
        min_open_interest: 350
        min_volume: 140
        max_spread_pct: 0.12
        entry_aggressiveness: 0.5
        entry_spread_penalty_multiplier: 0.18
        slippage_haircut_pct: 0.045
        spread_haircut_multiplier: 0.3
        fallback_delta: 0.32
        target_price_floor_multiplier: 0.68
        short_window_minutes: 30
        short_window_uplift: 0.1
        gamma_uplift_by_dte:
          0: 0.2
          1: 0.12
          2: 0.06
        target_delta_range:
        - 0.3
        - 0.65
        dte_preferences:
          0: 1.0
          1: 0.9
          2: 0.8
        ranking_weights:
          estimated_percent_return: 1.3
          estimated_total_gain: 1.15
          liquidity: 1.25
          spread_quality: 1.25
          delta_suitability: 1.0
          dte_fit: 1.0
      balanced:
        min_open_interest: 450
        min_volume: 180
        max_spread_pct: 0.1
        entry_aggressiveness: 0.45
        entry_spread_penalty_multiplier: 0.15
        slippage_haircut_pct: 0.05
        spread_haircut_multiplier: 0.32
        fallback_delta: 0.3
        target_price_floor_multiplier: 0.7
        short_window_minutes: 35
        short_window_uplift: 0.07
        gamma_uplift_by_dte:
          0: 0.15
          1: 0.1
          2: 0.05
        target_delta_range:
        - 0.28
        - 0.6
        dte_preferences:
          0: 0.8
          1: 0.9
          2: 1.0
        ranking_weights:
          estimated_percent_return: 1.1
          estimated_total_gain: 1.0
          liquidity: 1.35
          spread_quality: 1.35
          delta_suitability: 1.1
          dte_fit: 1.1
providers:
  market_data_provider: mock
  options_data_provider: mock
  runtime_market_loop_provider: mock
  historical_data_provider: alpaca
  market_intelligence_provider: alpaca
  options_runtime_provider: mock
  diagnostics_policy: warn_on_degraded
  market_data_backends:
    alpaca:
      enabled: false
      api_key: ''
      secret_key: ''
      base_url: https://paper-api.alpaca.markets
      data_url: https://data.alpaca.markets
      mock_on_unavailable: true
  options_data_backends:
    alpaca:
      enabled: false
      supported: false
      api_key: ''
      secret_key: ''
      mock_on_unavailable: true
