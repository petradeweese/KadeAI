visuals:
  default_timeframes: ["1m", "5m", "15m"]
  bar_window_sizes:
    1m: 90
    5m: 72
    15m: 60
  overlays:
    vwap: true
    trend_guide: true
    plan_lines: true
    tracking_markers: true
  panel_limits:
    max_panels: 5
    max_items_per_panel: 5
  marker_annotation_verbosity: "standard"
  history_retention: 20
