history:
  root_dir: .kade_storage/history
  supported_timeframes: ["1m", "5m", "15m"]
  batch_symbol_limit: 25
  metadata_summary_limit: 30
  downloader:
    chunk_days: 5
    requests_per_minute: 180
    pacing_sleep_seconds: 0.35
    request_window_minutes: 390
    session_timezone: America/New_York
    session_open: "09:30"
    session_close: "16:00"
    expected_bars_per_session: 390
    partial_session_tolerance: 1
    ignore_extended_hours: true
    skip_weekends: true
    holiday_dates: []
    early_close_dates: []
    max_retries: 3
    backoff_seconds: [0.5, 1.0, 2.0]
    retry_status_codes: [429, 500, 502, 503, 504]
  replay:
    future_window: 12
    trigger_lookback_bars: 20
    bias_lookback_bars: 20
    context_lookback_bars: 20
